<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>こども動画アルバム</title>
    <link rel="stylesheet" href="./styles.css?v=20260613-3" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Family video archive</p>
          <h1>こども動画アルバム</h1>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="syncButton" type="button" title="YouTubeから同期" aria-label="YouTubeから同期">
            <span aria-hidden="true">↻</span>
          </button>
          <button class="icon-button" id="settingsButton" type="button" title="設定" aria-label="設定">
            <span aria-hidden="true">⚙</span>
          </button>
        </div>
      </header>

      <main>
        <section class="toolbar" aria-label="表示切り替え">
          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="タイトル、タグ、メモ、年月日で検索" autocomplete="off" />
          </div>
          <nav class="tabs" aria-label="ビュー">
            <button class="tab active" type="button" data-view="home">ホーム</button>
            <button class="tab" type="button" data-view="timeline">年月</button>
            <button class="tab" type="button" data-view="favorites">お気に入り</button>
          </nav>
        </section>
        <section class="category-filters" id="categoryFilters" aria-label="カテゴリ絞り込み"></section>

        <section class="status-line" id="statusLine" aria-live="polite"></section>

        <section id="homeView" class="view"></section>
        <section id="timelineView" class="view hidden"></section>
        <section id="favoritesView" class="view hidden"></section>
      </main>
    </div>

    <dialog id="detailDialog" class="dialog wide-dialog">
      <form method="dialog" class="dialog-form">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Video detail</p>
            <h2 id="detailTitle">動画詳細</h2>
          </div>
          <button class="icon-button" value="close" type="submit" aria-label="閉じる" title="閉じる">×</button>
        </div>
        <div id="detailContent"></div>
      </form>
    </dialog>

    <dialog id="settingsDialog" class="dialog">
      <form method="dialog" class="dialog-form">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>設定</h2>
          </div>
          <button class="icon-button" value="close" type="submit" aria-label="閉じる" title="閉じる">×</button>
        </div>

        <div class="form-grid">
          <label>
            Google OAuth クライアントID
            <input id="clientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com" />
          </label>
          <p class="help-text">
            YouTube同期に使います。Google CloudでYouTube Data API v3を有効化し、OAuthクライアントIDを作成してください。
          </p>

          <label>
            子供の生年月
            <input id="birthMonthInput" type="month" />
          </label>

          <label>
            タグ候補
            <textarea id="tagSuggestionsInput" rows="4" placeholder="日常, 旅行, 誕生日"></textarea>
          </label>

          <div class="button-row">
            <button id="saveSettingsButton" class="primary-button" type="button">保存</button>
            <button id="exportButton" class="secondary-button" type="button">JSONエクスポート</button>
            <label class="file-button">
              JSONインポート
              <input id="importInput" type="file" accept="application/json" />
            </label>
          </div>
        </div>
      </form>
    </dialog>

    <dialog id="addDialog" class="dialog">
      <form method="dialog" class="dialog-form">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Manual add</p>
            <h2>動画を手動追加</h2>
          </div>
          <button class="icon-button" value="close" type="submit" aria-label="閉じる" title="閉じる">×</button>
        </div>
        <div class="form-grid">
          <label>
            YouTube URL または動画ID
            <input id="manualUrlInput" type="text" placeholder="https://youtu.be/..." />
          </label>
          <label>
            撮影日
            <input id="manualDateInput" type="date" />
          </label>
          <button id="manualAddButton" class="primary-button" type="button">追加</button>
        </div>
      </form>
    </dialog>

    <button class="floating-button" id="addButton" type="button" aria-label="動画を手動追加" title="動画を手動追加">＋</button>

    <template id="emptyTemplate">
      <div class="empty-state">
        <h2>まだ動画がありません</h2>
        <p>YouTube同期を行うか、右下の追加ボタンから動画URLを登録してください。</p>
        <div class="button-row center">
          <button class="primary-button" type="button" data-action="sync">YouTube同期</button>
          <button class="secondary-button" type="button" data-action="sample">サンプルを表示</button>
        </div>
      </div>
    </template>

    <script src="./app.js?v=20260613-3"></script>
  </body>
</html>
